<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrapper">
    <h1 class="game-title">TETRIS</h1>
    <div class="game-container">
      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section">
          <span class="label">TEMA</span>
          <label class="toggle-label">
            <input type="checkbox" id="theme-toggle" />
            <span class="toggle-track">
              <span class="toggle-thumb"></span>
            </span>
            <span class="toggle-text">CLARO</span>
          </label>
        </div>

        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd> pausa</li>
          </ul>
        </div>
      </aside>
    </div>

    <div id="overlay" class="overlay hidden">
      <div id="pause-content" class="overlay-box hidden">
        <h2 class="overlay-heading">PAUSA</h2>
        <div class="pause-menu">
          <button class="pause-btn" id="resume-btn">&#9654; Reanudar</button>
          <button class="pause-btn" id="menu-restart-btn">&#8635; Reiniciar</button>
          <div class="controls-section">
            <h3 class="controls-title">Controles</h3>
            <div class="controls-grid">
              <span class="key">&#8592; &#8594;</span><span>Mover</span>
              <span class="key">&#8593;</span><span>Rotar</span>
              <span class="key">&#8595;</span><span>Bajar</span>
              <span class="key">Espacio</span><span>Hard drop</span>
              <span class="key">P / Esc</span><span>Pausa</span>
            </div>
          </div>
          <div class="level-picker">
            <span class="level-label">Nivel inicial:</span>
            <button class="level-btn" id="level-down-btn">&#8722;</button>
            <span id="starting-level-display">1</span>
            <button class="level-btn" id="level-up-btn">+</button>
          </div>
        </div>
      </div>
      <div id="gameover-content" class="overlay-box hidden">
        <p id="overlay-title">GAME OVER</p>
        <p id="overlay-score"></p>
        <div id="name-capture" class="hidden">
          <p class="name-prompt">¡Entraste al top 5! Tu nombre:</p>
          <input type="text" id="player-name" maxlength="12" placeholder="Tu nombre" autocomplete="off" />
          <button id="save-score-btn">Guardar</button>
        </div>
        <button id="restart-btn">Reiniciar</button>
      </div>
    </div>
  </div>

  <section id="records-section">
    <div class="records-header">
      <h2 class="records-title">RECORDS</h2>
      <button id="reset-records-btn">Resetear</button>
    </div>
    <table id="scores-table">
      <thead>
        <tr>
          <th>#</th>
          <th>Nombre</th>
          <th>Puntaje</th>
          <th>Líneas</th>
        </tr>
      </thead>
      <tbody id="scores-body"></tbody>
    </table>
  </section>

  <script src="game.js"></script>
</body>
</html>
