name: Claude Issue Analyzer

on:
  issues:
    types: [opened, edited]

jobs:
  analyze-issue:
    if: github.actor != 'github-actions[bot]' && github.actor != 'claude[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Analyze issue with Claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: '--allowed-tools "Bash(gh issue edit *),Bash(gh issue comment *),Bash(gh label create *),Bash(gh label list *)"'
          prompt: |
            You are a technical assistant analyzing GitHub issue #${{ github.event.issue.number }} in this Tetris repository.

            **Issue:**
            Title: ${{ github.event.issue.title }}
            Body: ${{ github.event.issue.body }}
            Author: ${{ github.event.issue.user.login }}
            Event: ${{ github.event.action }}

            **Project architecture** (main file: game.js ~305 lines, no framework, no bundler):
            - rendering: canvas drawing, ghost piece, colors, drawBlock()
            - game-loop: requestAnimationFrame loop, timing, dropAccum/dropInterval
            - pieces: PIECES[], rotateCW(), tryRotate(), wall kicks offsets
            - board: 20×10 grid, merge(), clearLines(), collision detection
            - scoring: LINE_SCORES × level, hard drop +2pts/cell, soft drop +1pt/row
            - controls: keyboard event handlers
            - ui: overlays, score/lines/level display, next-piece preview canvas

            **Your tasks — execute them in this exact order:**

            1. Read game.js and CLAUDE.md to understand the code before diagnosing.

            2. Determine the issue type (bug / enhancement / documentation / question) and the affected area(s).

            3. Apply labels using the gh CLI:
               - First list existing labels: gh label list --repo ${{ github.repository }}
               - Create any missing label before adding it: gh label create "NAME" --color "#COLOR" --repo ${{ github.repository }}
               - Then add labels to the issue: gh issue edit ${{ github.event.issue.number }} --add-label "label1,label2" --repo ${{ github.repository }}

               Label reference:
               | Label            | Color   | When to use                                  |
               |------------------|---------|----------------------------------------------|
               | bug              | #d73a4a | Game behaves incorrectly                     |
               | enhancement      | #a2eeef | New feature or improvement requested         |
               | rendering        | #7057ff | Canvas, colors, drawing issues               |
               | game-loop        | #e4e669 | Timing, speed, animation issues              |
               | pieces           | #0075ca | Rotation, wall kicks, piece logic            |
               | board            | #cfd3d7 | Collision, line clearing, merge logic        |
               | scoring          | #008672 | Score calculation, level progression         |
               | controls         | #e99695 | Keyboard input handling                      |
               | ui               | #f9d0c4 | Overlays, panels, next-piece preview         |
               | documentation    | #0075ca | README, CLAUDE.md, comments                  |
               | good-first-issue | #7057ff | Small, well-scoped change                    |
               | help-wanted      | #008672 | Complex problem that needs extra attention   |

            4. Post a diagnostic comment:
               gh issue comment ${{ github.event.issue.number }} --repo ${{ github.repository }} --body "$(cat <<'COMMENT'
               ## Issue Diagnosis

               ### Problem Summary
               [1–2 sentences describing what is broken or requested]

               ### Affected Area(s)
               - `game.js` — specific function or line range

               ### Technical Diagnosis
               [Root cause analysis referencing real functions/variables: rotateCW(), tryRotate(), lockPiece(), clearLines(), drawBlock(), dropAccum, dropInterval, etc.]

               ### Suggested Approach
               [High-level technical direction for the fix — no code, just the approach]

               ---
               *Automatically generated by Claude. Review before implementing.*
               COMMENT
               )"

            Write the actual diagnostic content replacing the placeholder text in brackets. Reference real code — do not use generic descriptions.
